<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ntcharts-osm mapview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #1e1e1e; display: flex; }
        #terminal-container { flex: 1; min-height: 0; padding: 4px; overflow: hidden; }

        /* Floating overlay: links out to Nimble Markets and the repo. */
        #overlay {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }
        #overlay a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(4px);
            transition: background 0.15s ease, transform 0.15s ease,
                        border-color 0.15s ease;
        }
        #overlay a:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.3);
        }
        #overlay a.flame:hover {
            background: rgba(255, 122, 30, 0.22);
            border-color: rgba(255, 122, 30, 0.55);
        }
        #overlay svg { display: block; }
        #overlay img { display: block; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="terminal-container"></div>

    <!-- Overlay buttons: the Nimble Markets GitHub-org avatar links to
         nimble.markets, the GitHub mark links to the repo. -->
    <div id="overlay">
        <a class="flame" href="https://nimble.markets" target="_blank"
           rel="noopener" title="Nimble Markets" aria-label="Nimble Markets">
            <img src="https://avatars.githubusercontent.com/u/153999705?s=96&v=4"
                 width="28" height="28" alt="Nimble Markets"/>
        </a>
        <a class="github" href="https://github.com/NimbleMarkets/ntcharts-osm"
           target="_blank" rel="noopener" title="ntcharts-osm on GitHub"
           aria-label="ntcharts-osm on GitHub">
            <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true">
                <path fill="#e8e8e8" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
        </a>
    </div>

    <script src="wasm_exec.js"></script>
    <script type="module">
        import { BoobaTerminal } from './booba/booba.js';

        async function main() {
            // Load and start the Go WASM binary
            const go = new Go();
            const result = await WebAssembly.instantiateStreaming(
                fetch('app.wasm'), go.importObject
            );
            go.run(result.instance);

            // Initialize the terminal emulator
            const booba = new BoobaTerminal('terminal-container');
            await booba.init();

            // Connect via WASM adapter (polls bubbletea_read at ~60fps)
            booba.connectWasm();
            booba.focus();
        }

        main().catch(console.error);
    </script>
</body>
</html>
